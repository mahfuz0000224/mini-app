<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>File Submission Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --text-light: #f8fafc;
            --border-color: #334155;
            --warning: #ef4444;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .header-box {
            background: linear-gradient(135deg, #ec4899, #8b5cf6, #3b82f6);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .warning-box {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px dashed var(--warning);
            color: #fca5a5;
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #cbd5e1;
        }

        input[type="number"],
        input[type="tel"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Loading Overlay */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 5px solid rgba(59, 130, 246, 0.2);
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner"></div>
    <div id="status-text" style="font-weight: bold;">⏳ ফাইল আপলোড হচ্ছে...</div>
</div>

<div class="header-box">
    0 Fnd Cookies Submission Panel
</div>

<div class="warning-box">
    ⚠️ সতর্কতা: ১৫ পিস এর কম আইডি দিলে ফাইল রিজেক্ট হবে!
</div>

<form id="uploadForm">
    <div class="form-group">
        <label>কত পিস আইডি:</label>
        <input type="number" id="quantity" placeholder="যেমন: ২০" required min="15">
    </div>

    <div class="form-group">
        <label>পারসোনাল ফোন নাম্বার:</label>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
    </div>

    <div class="form-group">
        <label>XLSX ফাইল নির্বাচন করুন:</label>
        <input type="file" id="fileInput" accept=".xlsx" required>
    </div>

    <button type="submit" class="submit-btn">SUBMIT FILE</button>
</form>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // ⚙️ পরিবর্তনযোগ্য কনফিগারেশন
    const BOT_TOKEN = "8877648526:AAH9M5JIl1ySJ1HSEq3-OK8APb1i3QGyb00"; // <--- আপনার বটের আসল টোকেন
    const CHAT_ID = "-1004428404291";        // <--- আপনার টেলিগ্রাম গ্রুপ আইডি

    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const quantity = document.getElementById('quantity').value;
        const phone = document.getElementById('phone').value;
        const fileInput = document.getElementById('fileInput');

        if (parseInt(quantity) < 15) {
            alert("❌ সতর্কতা: ১৫ পিস এর কম আইডি গ্রহণযোগ্য নয়!");
            return;
        }

        if (fileInput.files.length === 0) {
            alert("❌ একটি .xlsx ফাইল সিলেক্ট করুন!");
            return;
        }

        const file = fileInput.files[0];
        const user = tg.initDataUnsafe.user || {};
        const username = user.username ? "@" + user.username : "No Username";
        const firstName = user.first_name || "User";
        const userId = user.id || "N/A";

        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        overlay.style.display = 'flex';

        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('document', file);

        // সাধারণ টেক্সট (কোনো বিশেষ সিনট্যাক্স ভুল হবে না)
        const captionText = "📥 নতুন ফাইল সাবমিশন!\n\n" +
                            "👤 ইউজার: " + firstName + " (" + username + ")\n" +
                            "🆔 User ID: " + userId + "\n" +
                            "📞 ফোন নাম্বার: " + phone + "\n" +
                            "📊 পরিমাণ: " + quantity + " পিস";

        formData.append('caption', captionText);

        // Received ইনলাইন বাটন
        const replyMarkup = {
            inline_keyboard: [
                [{ text: "📩 Received", callback_data: "/mark_received" }]
            ]
        };
        formData.append('reply_markup', JSON.stringify(replyMarkup));

        try {
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.ok) {
                // ১০ সেকেন্ড অ্যানিমেশন
                setTimeout(() => {
                    statusText.innerText = "✅ ID Submit Successful";
                    // ৩ সেকেন্ড পর অ্যাপ ক্লোজ
                    setTimeout(() => {
                        tg.close();
                    }, 3000);
                }, 10000);
            } else {
                alert("❌ ফাইল আপলোড ব্যর্থ হয়েছে! এরর: " + (result.description || "Unknown Error"));
                overlay.style.display = 'none';
            }
        } catch (err) {
            alert("💥 নেটওয়ার্ক এরর: " + err.message);
            overlay.style.display = 'none';
        }
    });
</script>
</body>
</html>
