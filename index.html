<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>File Submission Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --warning: #ef4444;
            --text-light: #f8fafc;
            --border-color: #334155;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .header-box {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #cbd5e1;
        }

        input[type="number"],
        input[type="tel"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Overlay Animation */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 5px solid rgba(59, 130, 246, 0.2);
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner" id="spinner"></div>
    <div id="status-text" style="font-weight: bold;">⏳ ফাইল আপলোড হচ্ছে...</div>
</div>

<div class="header-box">
    File Submission Panel
</div>

<form id="uploadForm">
    <div class="form-group">
        <label>কত পিস আইডি:</label>
        <input type="number" id="quantity" placeholder="যেমন: ২০" required min="15">
    </div>

    <div class="form-group">
        <label>পারসোনাল ফোন নাম্বার:</label>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
    </div>

    <div class="form-group">
        <label>XLSX ফাইল সিলেক্ট করুন:</label>
        <input type="file" id="fileInput" accept=".xlsx" required>
    </div>

    <button type="submit" class="submit-btn">SUBMIT FILE</button>
</form>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 🎯 কনফিগারেশন 
    const BOT_TOKEN = "<8877648526:AAH9M5JIl1ySJ1HSEq3-OK8APb1i3QGyb00>"; // এখানে আপনার বটের টোকেন দিন
    const CHAT_ID = "-1004428404291"; // আপনার গ্রুপ আইডি

    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const quantity = document.getElementById('quantity').value;
        const phone = document.getElementById('phone').value;
        const fileInput = document.getElementById('fileInput');

        if (parseInt(quantity) < 15) {
            alert("❌ সর্বনিম্ন ১৫ পিস আইডি দিতে হবে!");
            return;
        }

        if (fileInput.files.length === 0) {
            alert("❌ ফাইল নির্বাচন করুন!");
            return;
        }

        const file = fileInput.files[0];
        const user = tg.initDataUnsafe.user || {};
        const username = user.username ? "@" + user.username : "No Username";

        // স্ক্রিনে লোডিং দেখানো
        const overlay = document.getElementById('overlay');
        const statusText = document.getElementById('status-text');
        overlay.style.display = 'flex';

        // FormData দিয়ে ফাইল তৈরি
        const formData = new FormData();
        formData.append('chat_id', CHAT_ID);
        formData.append('document', file);
        
        // ফাইল ক্যাশে টেক্সট ও Received বাটন সেটআপ
        const caption = `📥 **নতুন ফাইল জমা পড়েছে!**\n\n` +
                        `👤 **ইউজার:** ${user.first_name || 'User'} (${username})\n` +
                        `🆔 **User ID:** \`${user.id || 'N/A'}\`\n` +
                        `📞 **ফোন নাম্বার:** \`${phone}\`\n` +
                        `📊 **পরিমাণ:** ${quantity} পিস`;

        formData.append('caption', caption);
        formData.append('parse_mode', 'Markdown');
        
        // Inline Keyboard Button
        const replyMarkup = {
            inline_keyboard: [
                [{ text: "📩 Received", callback_data: "/mark_received" }]
            ]
        };
        formData.append('reply_markup', JSON.stringify(replyMarkup));

        try {
            // টেলিগ্রাম Bot API-তে ফাইল পাঠানো
            const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, {
                method: 'POST',
                body: formData
            });

            const result = await response.json();

            if (result.ok) {
                // ১০ সেকেন্ড অ্যানিমেশন ও সাকসেস মেসেজ
                setTimeout(() => {
                    statusText.innerText = "✅ ID Submit Successful";
                    setTimeout(() => {
                        tg.close();
                    }, 3000);
                }, 7000);
            } else {
                alert("❌ আপলোড ব্যর্থ হয়েছে! আবার চেষ্টা করুন।");
                overlay.style.display = 'none';
            }
        } catch (err) {
            alert("💥 এরর: " + err.message);
            overlay.style.display = 'none';
        }
    });
</script>
</body>
</html>
