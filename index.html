<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>File Submission Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --text-light: #f8fafc;
            --border-color: #334155;
            --warning: #ef4444;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .header-box {
            background: linear-gradient(135deg, #ec4899, #8b5cf6, #3b82f6);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .warning-box {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px dashed var(--warning);
            color: #fca5a5;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #cbd5e1;
        }

        input[type="text"],
        input[type="number"],
        input[type="tel"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Overlay & Loader Animation */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 5px solid rgba(59, 130, 246, 0.2);
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #status-text {
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner" id="spinner"></div>
    <div id="status-text">⏳ ফাইল আপলোড এবং ভেরিফাই করা হচ্ছে...</div>
</div>

<div class="header-box">
    0 Fnd Cookies Submission Panel
</div>

<div class="warning-box">
    ⚠️ সতর্কতা: ১৫ পিস এর কম আইডি দিলে ফাইল রিজেক্ট হবে!
</div>

<form id="uploadForm">
    <div class="form-group">
        <label>টেলিগ্রাম ইউজারনেম:</label>
        <input type="text" id="customUsername" placeholder="@yourusername অথবা নাম" required>
    </div>

    <div class="form-group">
        <label>কত পিস আইডি:</label>
        <input type="number" id="quantity" placeholder="যেমন: ২০" required min="15">
    </div>

    <div class="form-group">
        <label>পারসোনাল ফোন নাম্বার:</label>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
    </div>

    <div class="form-group">
        <label>XLSX ফাইল নির্বাচন করুন:</label>
        <input type="file" id="fileInput" accept=".xlsx" required>
    </div>

    <button type="submit" class="submit-btn">SUBMIT FILE</button>
</form>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    // 🔗 আপনার Bots Business-এর html_submit কমান্ডের Webhook URL লিঙ্কটি এখানে বসান
    const BOTS_BUSINESS_WEBHOOK = "আপনার_BOTS_BUSINESS_WEBHOOK_URL_এখানে_দিন";

    document.getElementById('uploadForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const quantity = document.getElementById('quantity').value;
        if (parseInt(quantity) < 15) {
            alert("❌ সতর্কতা: ১৫ পিস এর কম আইডি গ্রহণযোগ্য নয়!");
            return;
        }

        const fileInput = document.getElementById('fileInput').files[0];
        const overlay = document.getElementById('overlay');
        const spinner = document.getElementById('spinner');
        const statusText = document.getElementById('status-text');

        // Overlay ওপেন
        overlay.style.display = 'flex';
        spinner.style.display = 'block';
        statusText.innerText = "⏳ ফাইল আপলোড এবং প্রসেস করা হচ্ছে...";

        try {
            // ১. ফাইল আপলোড
            const formData = new FormData();
            formData.append('file', fileInput);

            const uploadRes = await fetch('https://tmpfiles.org/api/v1/upload', {
                method: 'POST',
                body: formData
            });
            const uploadData = await uploadRes.json();

            if (uploadData.status === 'success') {
                const fileUrl = uploadData.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                const user = tg.initDataUnsafe.user || {};

                const payload = {
                    username: document.getElementById('customUsername').value,
                    quantity: quantity,
                    phone: document.getElementById('phone').value,
                    user_id: user.id || "N/A",
                    file_url: fileUrl
                };

                // ২. Bots Business-এ ডাটা সেন্ড
                await fetch(BOTS_BUSINESS_WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                // ⏳ ১০ সেকেন্ডের লোডিং হোল্ড
                setTimeout(() => {
                    spinner.style.display = 'none';
                    statusText.innerHTML = "✅ ID Submit Successful";
                    statusText.style.color = "#10b981";

                    // ⏳ ৩ সেকেন্ড পর মিনি অ্যাপ অটো ক্লোজ
                    setTimeout(() => {
                        tg.close();
                    }, 3000);

                }, 10000); // ১০ সেকেন্ড ফেক লোডার delay

            } else {
                alert("❌ ফাইল আপলোড হতে সমস্যা হয়েছে।");
                overlay.style.display = 'none';
            }
        } catch (err) {
            alert("💥 এরর: " + err.message);
            overlay.style.display = 'none';
        }
    });
</script>
</body>
</html>
