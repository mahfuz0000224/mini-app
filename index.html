<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>0 Fnd Cookies Submission Panel</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #3b82f6;
            --accent: #06b6d4;
            --warning: #ef4444;
            --text-light: #f8fafc;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .header-box {
            background: linear-gradient(135deg, #ec4899, #8b5cf6, #3b82f6);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .warning-box {
            background-color: rgba(239, 68, 68, 0.15);
            border: 1px dashed var(--warning);
            color: #fca5a5;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
            line-height: 1.4;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #cbd5e1;
        }

        input[type="number"],
        input[type="tel"],
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: #ffffff;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus,
        input[type="tel"]:focus {
            border-color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            transition: transform 0.1s;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        /* Fullscreen Overlay Animation */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(8px);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(59, 130, 246, 0.2);
            border-top: 5px solid #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        .spinner.success {
            border: 5px solid #10b981;
            animation: none;
        }

        #status-text {
            font-size: 16px;
            font-weight: bold;
            color: #f8fafc;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="spinner" id="loader-spinner"></div>
    <div id="status-text">⏳ প্রসেসিং করা হচ্ছে...</div>
</div>

<div class="header-box">
    0 Fnd Cookies Submission Panel
</div>

<div class="warning-box">
    ⚠️ সতর্কতা: ১৫ পিস এর কম আইডি দিলে ফাইল স্বয়ংক্রিয়ভাবে রিজেক্ট হবে!
</div>

<form id="submissionForm">
    <div class="form-group">
        <label for="quantity">কত পিস আইডি:</label>
        <input type="number" id="quantity" placeholder="যেমন: ২০" required min="1">
    </div>

    <div class="form-group">
        <label for="phone">পারসোনাল ফোন নাম্বার:</label>
        <input type="tel" id="phone" placeholder="01XXXXXXXXX" required>
    </div>

    <div class="form-group">
        <label for="file">XLSX ফাইল নির্বাচন করুন:</label>
        <input type="file" id="file" accept=".xlsx" required>
    </div>

    <button type="submit" class="submit-btn">SUBMIT FILE</button>
</form>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    document.getElementById('submissionForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const quantity = document.getElementById('quantity').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const fileInput = document.getElementById('file');

        if (parseInt(quantity) < 15) {
            alert("❌ সর্বনিম্ন ১৫ পিস আইডি দিতে হবে!");
            return;
        }

        if (!fileInput.files || fileInput.files.length === 0) {
            alert("❌ অনুগ্রহ করে একটি .xlsx ফাইল নির্বাচন করুন!");
            return;
        }

        const fileName = fileInput.files[0].name;

        // Overlay & Loader
        const overlay = document.getElementById('overlay');
        const spinner = document.getElementById('loader-spinner');
        const statusText = document.getElementById('status-text');

        overlay.style.display = 'flex';

        const payload = {
            quantity: quantity,
            phone: phone,
            fileName: fileName
        };

        // ১০ সেকেন্ড অ্যানিমেশন
        setTimeout(() => {
            spinner.classList.add('success');
            statusText.innerText = "✅ ID Submit Successful";

            // ৩ সেকেন্ড পর অ্যাপ বন্ধ
            setTimeout(() => {
                tg.sendData(JSON.stringify(payload));
                tg.close();
            }, 3000);

        }, 10000);
    });
</script>
</body>
</html>
